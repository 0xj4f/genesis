name: Release & Push to Docker Hub

on:
  push:
    branches: [main, master]

env:
  MAJOR_VERSION: 0
  MINOR_VERSION: 3

jobs:
  tag-and-push:
    name: Build, Tag & Push
    runs-on: ubuntu-latest
    environment: Development
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate patch version
        id: version
        run: |
          EXISTING=$(git tag -l "v${MAJOR_VERSION}.${MINOR_VERSION}.*" | wc -l | tr -d ' ')
          PATCH=$EXISTING
          VERSION="${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Version: ${VERSION}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push genesis API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            0xj4f/genesis:${{ steps.version.outputs.version }}
            0xj4f/genesis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push genesis-web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            0xj4f/genesis-web:${{ steps.version.outputs.version }}
            0xj4f/genesis-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag
        run: |
          git config user.name "0xj4f"
          git config user.email "jeanandrewfuentes@gmail.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Genesis ${{ steps.version.outputs.version }}
          body: |
            ## Docker Images

            ```bash
            docker pull 0xj4f/genesis:${{ steps.version.outputs.version }}
            docker pull 0xj4f/genesis-web:${{ steps.version.outputs.version }}
            ```

            ## Quick Start

            ```bash
            curl -O https://raw.githubusercontent.com/0xj4f/genesis/main/docker-compose.prod.yml
            TAG=${{ steps.version.outputs.version }} docker compose -f docker-compose.prod.yml up -d
            ```
          generate_release_notes: true
