services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: genesis
      MYSQL_USER: dev_project
      MYSQL_PASSWORD: dev_password_please_change
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      # Database
      MYSQL_DEV_USER: dev_project
      MYSQL_DEV_PASSWORD: dev_password_please_change
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
      DATABASE_NAME: genesis
      # JWT / Auth
      OAUTH_ISSUER: http://localhost:8001
      OAUTH_ALGORITHM: RS256
      OAUTH_DEFAULT_AUDIENCE: genesis-api
      OAUTH_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      OAUTH_REFRESH_TOKEN_TTL_DAYS: "30"
      OAUTH_SECRET_KEY: change_me_to_a_random_hex_string_in_production
      OAUTH_PRIVATE_KEY_PATH: ./secrets/dev-private.pem
      OAUTH_PUBLIC_KEY_PATH: ./secrets/dev-public.pem
      OAUTH_JWT_KID: genesis-dev-1
      # CORS - allow the web frontend
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8082"
      # Sessions
      MAX_CONCURRENT_SESSIONS: "5"
      # Storage
      STORAGE_BACKEND: local
      UPLOAD_DIR: ./uploads
      # Logging
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  web:
    build: ./web
    ports:
      - "8082:80"
    depends_on:
      - api

volumes:
  mysql_data:
